<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="./output.css" rel="stylesheet" />
        <script defer src="js/module.js"></script>
        <title>Tic-Tac-Toe</title>
    </head>

    <body>
        <!-- Title -->

        <div class="mt-10 mb-10 text-center text-3xl font-bold">
            Welcome to Tic-Tac-Toe!
        </div>

        <!-- Game Board -->

        <div class="flex justify-center">
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="1"
            ></div>
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="2"
            ></div>
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="3"
            ></div>
        </div>

        <div class="flex justify-center text-center">
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="4"
            ></div>
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="5"
            ></div>
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="6"
            ></div>
        </div>

        <div class="flex justify-center text-center">
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="7"
            ></div>
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="8"
            ></div>
            <div
                class="tile flex h-32 w-32 items-center justify-center border-2 text-8xl"
                id="9"
            ></div>
        </div>

        <!-- Player Menu -->

        <form class="form">
            <div class="mt-10 flex justify-center gap-16">
                <div class="flex flex-col">
                    <label>Player 1's Name (X)</label>
                    <input
                        class="rounded-md border-2"
                        type="text"
                        id="player1"
                        name="player1"
                        placeholder="Name"
                        required
                    />
                </div>

                <div class="flex flex-col">
                    <label>Player 2's Name (O)</label>
                    <input
                        class="rounded-md border-2"
                        type="text"
                        id="player2"
                        name="player2"
                        placeholder="Name"
                        required
                    />
                </div>
            </div>

            <button
                class="mx-auto mt-10 flex rounded-xl border-2 px-10 py-2"
                type="submit"
                id="start"
            >
                Start
            </button>
        </form>

        <!-- Restart Button -->

        <button
            class="invisible mx-auto mt-10 flex rounded-xl border-2 px-10 py-2"
            id="restart"
        >
            Restart
        </button>

        <!-- Results & Game Commands Display -->

        <div
            class="mx-auto mt-4 mb-4 flex justify-center text-3xl"
            id="display"
        ></div>
    </body>
</html>
